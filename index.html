<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake & Ladder Game | Nazeer Safety Solutions</title>
  <link rel="stylesheet" href="style.css?v=13" />
</head>
<body>
  <header>
    <div class="logo-left">
      <img src="logo.png" alt="Nazeer Safety Solutions" class="site-logo">
    </div>
    <div class="title-stack">
      <h1>Snake & Ladder Game</h1>
      <h2>Causes & Consequences of Safety & Accidents</h2>
      <p>Nazeer Safety Solutions, Dubai, UAE</p>
    </div>
  </header>

  <main>
    <div class="board-wrapper">
      <div id="board"></div>
    </div>
    
    <div id="controls">
      <div id="dice">🎲</div>
      <div id="dice-value">Ready</div>
      <button id="roll-btn" onclick="play()">🎲 ROLL DICE</button>
      <div id="status">🟢 Your Turn | You: 1 | AI: 1</div>
      <div id="message">Click ROLL to start</div>
    </div>
  </main>

  <footer>
    <p>© 2026 Nazeer Safety Solutions, Dubai, UAE</p>
  </footer>

  <script src="script.js?v=13"></script>
</body>
</html>
